<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EfikCoin Wallet – Test</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 2rem; }
        button { background: #f59e0b; color: black; padding: 0.5rem 1rem; border: none; cursor: pointer; margin: 1rem 0; }
        pre { background: #111; padding: 1rem; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>EfikCoin Eternal Wallet – Test</h1>
    <button id="createBtn">Create New Wallet</button>
    <div id="output"></div>

    <script>
        document.getElementById('createBtn').addEventListener('click', () => {
            const wallet = ethers.Wallet.createRandom();
            const mnemonic = wallet.mnemonic.phrase;
            const address = wallet.address;
            document.getElementById('output').innerHTML = `
                <h3>Wallet Created!</h3>
                <p><strong>Address:</strong> ${address}</p>
                <p><strong>Seed phrase (12 words):</strong> ${mnemonic}</p>
                <p style="color: #ffa500;">Save this seed phrase! You will need it to recover your wallet.</p>
                <button id="saveAndContinue">Save and Continue</button>
            `;
            // Store in localStorage
            localStorage.setItem('eceWalletSeed', mnemonic);
            // Add continue button handler
            document.getElementById('saveAndContinue').addEventListener('click', () => {
                alert('Wallet saved. You can now use it. Reloading to show dashboard...');
                location.reload();
            });
        });

        // On load, check if wallet exists
        const seed = localStorage.getItem('eceWalletSeed');
        if (seed) {
            const wallet = ethers.Wallet.fromMnemonic(seed);
            document.getElementById('output').innerHTML = `
                <h3>Existing Wallet Found</h3>
                <p><strong>Address:</strong> ${wallet.address}</p>
                <button id="clearWallet">Clear Wallet</button>
            `;
            document.getElementById('clearWallet')?.addEventListener('click', () => {
                localStorage.removeItem('eceWalletSeed');
                location.reload();
            });
        }
    </script>
</body>
</html>
